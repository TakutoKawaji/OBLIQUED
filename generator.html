<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<title>OBLIQUE — puzzle generator</title>
<style>
  html,body{margin:0;background:#111;color:#eee;font-family:Consolas,Menlo,monospace;height:100%}
  #wrap{max-width:760px;margin:0 auto;padding:24px}
  h1{font-size:16px;letter-spacing:.08em;margin:0 0 4px}
  p{color:#999;font-size:13px;line-height:1.6}
  button{font:13px Consolas,Menlo,monospace;letter-spacing:.05em;background:#000;color:#fff;border:1px solid #fff;padding:8px 14px;cursor:pointer}
  button:disabled{opacity:.4;cursor:default}
  #log{white-space:pre-wrap;background:#000;border:1px solid #333;padding:12px;margin-top:16px;height:50vh;overflow-y:auto;font-size:12px;line-height:1.5}
  .fail{color:#f66}
  .ok{color:#6f6}
</style>
<div id="wrap">
  <h1>OBLIQUE — PUZZLE GENERATOR</h1>
  <p>
    ゲーム本体（index.html）とは別に、パズルの解を一意に絞り込む処理をここで行います。<br>
    「Generate」を押すと PUZZLE_MAP 上の全パズルを生成し、<code>puzzle-data.js</code> としてダウンロードします。<br>
    出力したファイルを index.html と同じフォルダに置くと、ゲーム側は解の探索を一切行わずキャッシュを読むだけになります。
  </p>
  <p>
    既存の <code>puzzle-data.js</code> を読み込むと、そこに含まれるパズルはスキップし、未生成のものだけを作成して上書き保存します。<br>
    読み込まない場合は全パズルを新規生成します。
  </p>
  <input type="file" id="loadFile" accept=".js">
  <div id="loadStatus" style="margin-top:8px;color:#999;font-size:12px"></div>
  <div style="margin-top:16px">
    <button id="go">Generate / Update puzzle-data.js</button>
  </div>
  <div id="log"></div>
</div>
<script>
'use strict';
const GRID=128;
const PUZZLE_MAP=
`____,_W__K_F__Z____
S___Y________R____N_
____________A______G_
T_X__C__V____J_M_____
P__H_______OBLIQUED_`;
function parseGrid(str){const lines=str.split('\n'),out=[];lines.forEach((line,r)=>{for(let c=0;c<line.length;c++){const ch=line[c];if(ch&&ch!=='_')out.push({r,c,ch,x:c*GRID,y:r*GRID})}});return out}

class DSU{constructor(n){this.p=Array.from({length:n},(_,i)=>i)}find(x){while(this.p[x]!==x){this.p[x]=this.p[this.p[x]];x=this.p[x]}return x}union(a,b){a=this.find(a);b=this.find(b);if(a!==b)this.p[a]=b}}
function vertexClues(active,diag,rows,cols){const out={};for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(active[r][c]){const d=diag[r+','+c],v=d==='black'?[[r,c],[r+1,c+1]]:[[r,c+1],[r+1,c]];v.forEach(([y,x])=>out[y+','+x]=(out[y+','+x]||0)+1)}return out}
function letterName(i){return String.fromCharCode(65+i)}
function alphabetHints(active,diag,rows,cols){const dsu=new DSU((rows+1)*(cols+1)),edges=[];const id=(r,c)=>r*(cols+1)+c;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(active[r][c]){const slash=diag[r+','+c]==='dot';dsu.union(slash?id(r,c+1):id(r,c),slash?id(r+1,c):id(r+1,c+1));if(r===0||!active[r-1][c])edges.push({r,c,side:'top',v:slash?id(r,c+1):id(r,c)});if(r===rows-1||!active[r+1][c])edges.push({r,c,side:'bottom',v:slash?id(r+1,c):id(r+1,c+1)});if(c===0||!active[r][c-1])edges.push({r,c,side:'left',v:slash?id(r+1,c):id(r,c)});if(c===cols-1||!active[r][c+1])edges.push({r,c,side:'right',v:slash?id(r+1,c+1):id(r,c+1)})}
  const groups={};edges.forEach(e=>(groups[dsu.find(e.v)]??=[]).push(e));let n=0,out=[];Object.values(groups).forEach(g=>{if(g.length>1){const label=letterName(n++);g.forEach(e=>out.push({...e,label}))}});return out}
function vidToKey(v,cols){const r=Math.floor(v/(cols+1)),c=v%(cols+1);return r+','+c}
function computeCluesExcludingLetters(active,answer,rows,cols){
  const letters=alphabetHints(active,answer,rows,cols);
  const letterKeys=new Set(letters.map(h=>vidToKey(h.v,cols)));
  const fullAll=vertexClues(active,answer,rows,cols),full={};
  Object.entries(fullAll).forEach(([k,val])=>{if(!letterKeys.has(k))full[k]=val});
  return {full,letters};
}
function vertexOptions(active,rows,cols,vr,vc){const q=[];[[vr-1,vc-1,'black'],[vr-1,vc,'dot'],[vr,vc-1,'dot'],[vr,vc,'black']].forEach(([r,c,state])=>{if(r>=0&&c>=0&&r<rows&&c<cols&&active[r][c])q.push({key:r+','+c,state})});return q}
function edgeOK(active,diag,rows,cols,hints,final){const d=new DSU((rows+1)*(cols+1)),id=(r,c)=>r*(cols+1)+c;Object.entries(diag).forEach(([k,state])=>{const [r,c]=k.split(',').map(Number);d.union(state==='black'?id(r,c):id(r,c+1),state==='black'?id(r+1,c+1):id(r+1,c))});for(let i=0;i<hints.length;i++)for(let j=i+1;j<hints.length;j++){const same=d.find(hints[i].v)===d.find(hints[j].v);if(hints[i].label!==hints[j].label&&same)return false;if(final&&hints[i].label===hints[j].label&&!same)return false}return true}
function solveUnique(active,rows,cols,clues,hints){let count=0,nodes=0,budget=false;const cells=[];for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(active[r][c])cells.push(r+','+c);function go(diag){if(count>1||budget)return;if(++nodes>1500){budget=true;return}const cur={...diag};let changed=true;while(changed){changed=false;for(const [vk,target] of Object.entries(clues)){const [vr,vc]=vk.split(',').map(Number),opts=vertexOptions(active,rows,cols,vr,vc),touch=opts.filter(o=>cur[o.key]===o.state).length,free=opts.filter(o=>cur[o.key]===undefined);if(touch>target||touch+free.length<target)return;if(touch===target)for(const o of free){cur[o.key]=o.state==='black'?'dot':'black';changed=true}else if(touch+free.length===target)for(const o of free){cur[o.key]=o.state;changed=true}}}if(!edgeOK(active,cur,rows,cols,hints,false))return;const next=cells.find(k=>cur[k]===undefined);if(!next){if(edgeOK(active,cur,rows,cols,hints,true))count++;return}for(const state of ['black','dot'])go({...cur,[next]:state})}go({});return {count,budget}}
function generatePuzzleLoops(active,rows,cols,index){let seed=12345+index*7919;const rnd=()=>((seed=(seed*1664525+1013904223)>>>0)/4294967296);const cells=[];for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(active[r][c])cells.push(r+','+c);for(let attempt=0;attempt<24;attempt++){const answer={};cells.forEach(k=>answer[k]=rnd()<.5?'black':'dot');const {full,letters}=computeCluesExcludingLetters(active,answer,rows,cols),base=solveUnique(active,rows,cols,full,letters);if(base.count!==1||base.budget)continue;let clues={...full},hints=letters.slice();const order=Object.keys(full).sort(()=>rnd()-.5);order.forEach(k=>{const trial={...clues};delete trial[k];const r=solveUnique(active,rows,cols,trial,hints);if(r.count===1&&!r.budget)clues=trial});const labels=[...new Set(hints.map(h=>h.label))].sort(()=>rnd()-.5);labels.forEach(label=>{const trial=hints.filter(h=>h.label!==label),r=solveUnique(active,rows,cols,clues,trial);if(r.count===1&&!r.budget)hints=trial});return {answer,clues,letterHints:hints}}return null}

function computeActiveGrid(ch){
  const rows=16,cols=16,scale=40,mask=document.createElement('canvas'),m=mask.getContext('2d');
  mask.width=cols*scale;mask.height=rows*scale;m.fillStyle='#000';m.fillRect(0,0,mask.width,mask.height);m.fillStyle='#fff';m.textAlign='center';m.textBaseline='middle';let fontSize=mask.height*.99;m.font=`bold ${fontSize}px Arial`;while(m.measureText(ch).width>mask.width*.97){fontSize-=1;m.font=`bold ${fontSize}px Arial`};m.fillText(ch,mask.width/2,mask.height/2+fontSize*.02);
  const pixels=m.getImageData(0,0,mask.width,mask.height).data,active=[];
  for(let r=0;r<rows;r++){active[r]=[];for(let c=0;c<cols;c++){
    let white=0;for(let yy=0;yy<scale;yy++)for(let xx=0;xx<scale;xx++)white+=pixels[((r*scale+yy)*mask.width+c*scale+xx)*4];
    active[r][c]=white/(scale*scale)>96;
  }}
  return {rows,cols,active};
}

const puzzleEntries=parseGrid(PUZZLE_MAP);
puzzleEntries.forEach((e,i)=>e.globalIndex=i);

const logEl=document.getElementById('log'), btn=document.getElementById('go');
const loadFileEl=document.getElementById('loadFile'), loadStatusEl=document.getElementById('loadStatus');
function log(line,cls){const d=document.createElement('div');if(cls)d.className=cls;d.textContent=line;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight}

let existingData=null; // parsed {index: {...}} from a loaded puzzle-data.js, or null if none loaded

function parsePuzzleDataText(text){
  // puzzle-data.js is `window.PUZZLE_CACHE = {...};` — extract the object literal safely.
  const m=text.match(/PUZZLE_CACHE\s*=\s*(\{[\s\S]*\})\s*;?\s*$/);
  if(!m) throw new Error('PUZZLE_CACHE assignment not found in file');
  return JSON.parse(m[1]);
}

loadFileEl.addEventListener('change',()=>{
  const file=loadFileEl.files[0];
  if(!file){existingData=null;loadStatusEl.textContent='';return}
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      existingData=parsePuzzleDataText(reader.result);
      const n=Object.keys(existingData).length;
      loadStatusEl.textContent=`loaded ${file.name}: ${n} existing puzzle(s) — these will be skipped`;
      loadStatusEl.style.color='#6f6';
    }catch(err){
      existingData=null;
      loadStatusEl.textContent=`failed to parse ${file.name}: ${err.message}`;
      loadStatusEl.style.color='#f66';
    }
  };
  reader.onerror=()=>{
    existingData=null;
    loadStatusEl.textContent=`failed to read ${file.name}`;
    loadStatusEl.style.color='#f66';
  };
  reader.readAsText(file);
});

function shapeKeysOf(active,rows,cols){const keys=[];for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(active[r][c])keys.push(r+','+c);return keys}

function generateAll(){
  const data={...(existingData||{})},total=puzzleEntries.length;
  const skipCount=puzzleEntries.filter(e=>data[e.globalIndex]!==undefined).length;
  if(skipCount>0) log(`${skipCount}/${total} puzzles already present — skipping those, generating the rest...`);
  else log(`generating ${total} puzzles...`);
  puzzleEntries.forEach((e,i)=>{
    // Always compute the active grid, even for entries we'll skip, so we can backfill
    // "shape" onto older cache entries that predate baked-shape support.
    const {rows,cols,active}=computeActiveGrid(e.ch);
    if(data[e.globalIndex]!==undefined){
      if(!data[e.globalIndex].shape){
        data[e.globalIndex]={...data[e.globalIndex],shape:shapeKeysOf(active,rows,cols)};
        log(`[${i+1}/${total}] ${e.ch} (index ${e.globalIndex}) already exists — backfilled shape data`,'ok');
      }else{
        log(`[${i+1}/${total}] ${e.ch} (index ${e.globalIndex}) already exists — skipped`);
      }
      return;
    }
    const t0=performance.now();
    const g=generatePuzzleLoops(active,rows,cols,e.globalIndex);
    const ms=(performance.now()-t0).toFixed(0);
    if(g){data[e.globalIndex]={answer:g.answer,clues:g.clues,letterHints:g.letterHints,shape:shapeKeysOf(active,rows,cols)};log(`[${i+1}/${total}] ${e.ch} (index ${e.globalIndex}) ${ms}ms`,'ok')}
    else log(`[${i+1}/${total}] ${e.ch} (index ${e.globalIndex}) ${ms}ms — FAILED, no unique solution found`,'fail');
  });
  return data;
}

function downloadPuzzleData(data){
  const body='window.PUZZLE_CACHE = '+JSON.stringify(data)+';\n';
  const blob=new Blob([body],{type:'text/javascript'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='puzzle-data.js';document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(url);
}

btn.addEventListener('click',()=>{
  btn.disabled=true;logEl.textContent='';
  // let the "generating..." UI paint before the blocking work starts
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const data=generateAll();
    downloadPuzzleData(data);
    log(`done — exported ${Object.keys(data).length}/${puzzleEntries.length} puzzles to puzzle-data.js`);
    btn.disabled=false;
  }));
});

// also available from the console
window.OBLIQUE_exportPuzzleData=()=>{const data=generateAll();downloadPuzzleData(data);return data};
</script>
</html>
